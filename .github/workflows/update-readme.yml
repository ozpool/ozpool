name: update-readme

on:
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update.sh'
      - '.github/workflows/update-readme.yml'

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: refresh README blocks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ozpool
        run: bash scripts/update.sh

      - name: commit on diff
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add README.md
            git commit -m 'chore(readme): refresh auto blocks'
            git push
          else
            echo 'no changes'
          fi
